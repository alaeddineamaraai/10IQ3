is;white-space:nowrap;">${c.email_subject||'Recruiting inquiry'}</div><div style="color:var(--t3);font-family:var(--mono);font-size:11px;">${c.email_sent_at?new Date(c.email_sent_at).toLocaleDateString():'—'}</div><span class="pill ${c.email_opened?'pill-tg':'pill-ghost'}">${c.email_opened?'Yes':'No'}</span><span class="pill ${c.replied?'pill-tg':'pill-ghost'}">${c.replied?'Yes':'—'}</span></div>`).join('')}</div></div>`;setTimeout(()=>{kc('d1');const ctx=document.getElementById('d1');if(ctx)charts['d1']=new Chart(ctx,{type:'line',data:{labels:['M','T','W','T','F','S','S'],datasets:[{data:[0,1,0,2,1,3,sent],borderColor:'#c8f020',backgroundColor:'rgba(200,240,32,.06)',fill:true,tension:.45,pointRadius:4,pointBackgroundColor:'#c8f020',borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'rgba(255,255,255,.3)',font:{size:10}},grid:{color:'rgba(255,255,255,.03)'}},y:{ticks:{color:'rgba(255,255,255,.3)',font:{size:10}},grid:{color:'rgba(255,255,255,.03)'},beginAtZero:true}}}});},80);}

function changePage(dir){const totalPages=Math.ceil(filteredCoaches.length/PAGE_SIZE);currentPage=Math.max(0,Math.min(totalPages-1,currentPage+dir));renderCoachTable();}
function renderCoachTable(){const paged=filteredCoaches.slice(currentPage*PAGE_SIZE,(currentPage+1)*PAGE_SIZE);const tb=document.getElementById('ctb');if(tb)tb.innerHTML=paged.map(c=>cRow(c)).join('');}
async function generateEmail(email){const c=allCoaches.find(x=>x.email===email);if(!c)return;const btn=document.querySelector(`[onclick="generateEmail('${email}')"]`);if(btn){btn.textContent='Generating...';btn.disabled=true;}try{const system=`You are an expert college tennis recruiting email writer. Write concise, personalized recruiting emails (150-200 words) from a high school tennis player to a college coach. Output ONLY valid JSON: {"subject":"...","body":"..."}. No markdown, no explanation.`;const userMsg=`Write a recruiting email.\nATHLETE: Name: ${currentUser.name}, UTR: ${currentUser.utr||'N/A'}, WTN: ${currentUser.wtn||'N/A'}, GPA: ${currentUser.gpa||'N/A'}, Grad year: ${currentUser.gradYear||'N/A'}, School: ${currentUser.school||'N/A'}, Location: ${currentUser.location||'N/A'}, Singles record: ${currentUser.singlesRecord||'N/A'}, Doubles: ${currentUser.doublesRecord||'N/A'}, Style: ${currentUser.style||'N/A'}, Video: ${currentUser.videoLink||'N/A'}\nCOACH: ${c.coach_name}, ${c.school_name}, ${c.division}, Team UTR: ${c.team_utr||'N/A'}, Team WTN: ${c.team_wtn||'N/A'}`;const txt=await callClaude([{role:'user',content:userMsg}],system);const parsed=JSON.parse(txt.replace(/```json|```/g,'').trim());generatedEmails[email]=parsed;renderCoaches();}catch(e){alert('Failed to generate email: '+e.message);if(btn){btn.textContent='Draft AI Email';btn.disabled=false;}}}
async function sendEmailToCoach(email){const c=allCoaches.find(x=>x.email===email);const em=generatedEmails[email];if(!c||!em)return;const plan=currentUser?.plan||'free';const used=currentUser?.emailsUsed||0;if(plan==='free'&&used>=5){nav('paywall');return;}sendingEmails.add(email);renderCoaches();try{await sendEmail(c.email,em.subject,em.body);await sb(`coaches_database?email=eq.${encodeURIComponent(email)}`,{method:'PATCH',body:JSON.stringify({email_sent:true,email_sent_at:new Date().toISOString(),email_subject:em.subject,email_body:em.body})});const idx=allCoaches.findIndex(x=>x.email===email);if(idx>-1)allCoaches[idx]={...allCoaches[idx],email_sent:true,email_sent_at:new Date().toISOString(),email_subject:em.subject};currentUser.emailsUsed=used+1;selectedCoaches.delete(email);if(plan==='free'&&currentUser.emailsUsed>=5)nav('paywall');else renderCoaches();}catch(e){alert('Send failed: '+e.message);sendingEmails.delete(email);renderCoaches();}}
function renderPaywall(v){v.innerHTML=`<div style="min-height:700px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;"><div class="logo" style="margin-bottom:16px;font-size:20px;">${svgLogo(26)} 10IQ</div><div style="font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;">You've used your 5 free emails</div><h2 style="font-size:36px;font-weight:800;letter-spacing:-1.5px;margin-bottom:8px;text-align:center;">Upgrade to keep going</h2><p style="font-size:14px;color:var(--t2);margin-bottom:32px;text-align:center;">Unlock unlimited emails and reach every coach.</p><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:760px;width:100%;">${[{n:'Free',p:'$0',d:'Current plan',f:['5 free emails','Coach browser','AI generator'],b:'Current plan',id:'free',dis:true},{n:'Pro ✦',p:'$59',d:'Most popular',pop:true,f:['Unlimited emails','AI advisor','Full analytics','Follow-ups'],b:'Get Pro Access',id:'pro'},{n:'Elite',p:'$99',d:'Full concierge',f:['Everything in Pro','Done-for-you','Strategy call'],b:'Get Elite Access',id:'elite'}].map(p=>`<div class="gc pc ${p.pop?'pop':''}">${p.pop?'<div class="pop-b">MOST POPULAR</div>':''}<div class="pc-name" style="${p.pop?'color:var(--tg)':''}">${p.n}</div><div class="pc-desc">${p.d}</div><div class="pc-price" style="${p.pop?'color:var(--tg)':''}">${p.p}<span style="font-size:12px;font-weight:400;color:var(--t3)">/mo</span></div>${p.f.map(f=>`<div class="pc-f"><span class="pc-ck">✓</span>${f}</div>`).join('')}<button class="btn ${p.pop?'btn-solid':''}" style="width:100%;margin-top:18px;" onclick="selectPlan('${p.id}')" ${p.dis?'disabled':''}>${p.b}</button></div>`).join('')}</div><div style="margin-top:14px;font-size:12px;color:var(--t3);">No credit card required · Cancel anytime</div></div>`;}
function selectPlan(plan){currentUser.plan=plan;nav('dash');}
function renderAI(v2){const v=v2||document.getElementById('view');v.innerHTML=topbar('ai')+`<div class="page"><div class="gc" style="padding:20px;display:flex;flex-direction:column;gap:14px;min-height:360px;max-height:520px;overflow-y:auto;" id="ai-chat-box">${aiHistory.length===0?`<div style="text-align:center;padding:3rem 1rem;"><div style="font-size:32px;margin-bottom:12px;">◈</div><div style="font-size:14px;color:var(--t2);margin-bottom:20px;">Ask about fit, schools, strategy, or recruiting timelines</div><div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;">${['Which D1 schools match my UTR?','Best D3 outreach strategy?','When should I start recruiting?','Which coaches reply fastest?'].map(q=>`<button class="qq" onclick="sendAI('${q}')">${q}</button>`).join('')}</div></div>`:aiHistory.map(m=>`<div style="display:flex;justify-content:${m.role==='user'?'flex-end':'flex-start'};gap:10px;align-items:flex-start;">${m.role==='assistant'?'<div class="ai-icon">◈</div>':''}<div class="${m.role==='user'?'ai-user':'ai-bot'}">${m.content}</div></div>`).join('')}</div><div style="display:flex;gap:10px;"><div class="srch-wrap" style="flex:1;"><input class="srch" id="ai-input" style="padding:12px 16px;" placeholder="Ask about fit, schools, strategy..." onkeydown="if(event.key==='Enter') sendAI()"/></div><button class="btn btn-solid" id="ai-send-btn" onclick="sendAI()">Send →</button></div></div>`;}
async function sendAI(preset){const input=document.getElementById('ai-input');const msg=preset||input?.value?.trim();if(!msg)return;if(input)input.value='';aiHistory.push({role:'user',content:msg});renderAI();try{const system=`You are an elite college tennis recruiting advisor with access to ${allCoaches.length} coaches. The athlete's profile: ${JSON.stringify(currentUser)}. Be specific, helpful, and concise.`;const reply=await callClaude(aiHistory,system);aiHistory.push({role:'assistant',content:reply});}catch(e){aiHistory.push({role:'assistant',content:'Sorry, I encountered an error. Please try again.'});}renderAI();}
function renderProfile(v){v.innerHTML=topbar('dash')+`<div class="page"><div class="gc cp"><div class="cp-title">Profile</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;">${[['Name',currentUser.name||''],['Email',currentUser.email||''],['UTR',currentUser.utr||''],['Grad Year',currentUser.gradYear||''],['GPA',currentUser.gpa||''],['Location',currentUser.location||''],['School',currentUser.school||''],['Singles',currentUser.singlesRecord||''],['Doubles',currentUser.doublesRecord||''],['WTN',currentUser.wtn||'']].map(([l,val])=>`<div><div style="font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);margin-bottom:5px;font-weight:600;">${l}</div><div style="font-size:13px;color:var(--t1);background:rgba(255,255,255,0.03);border:1px solid var(--glass-border);border-radius:10px;padding:10px 13px;">${val||'—'}</div></div>`).join('')}</div><div style="display:flex;gap:10px;"><button class="btn" onclick="nav('dash')">← Dashboard</button><button class="btn btn-solid" style="color:rgba(239,68,68,0.9);background:rgba(239,68,68,0.08);border-color:rgba(239,68,68,0.2);" onclick="currentUser=null;allCoaches=[];nav('home')">Sign out</button></div></div><div class="gc cp"><div class="cp-title">Subscription</div><div style="font-size:18px;font-weight:800;color:var(--t1);margin-bottom:4px;">${currentUser.plan==='elite'?'Elite Plan':currentUser.plan==='pro'?'Pro Plan':'Free Plan'}</div><div style="font-size:13px;color:var(--t2);margin-bottom:16px;">${currentUser.emailsUsed||0} of ${currentUser.plan==='free'?'5':'unlimited'} emails used</div>${currentUser.plan==='free'?`<button class="btn btn-solid" onclick="nav('paywall')">Upgrade plan →</button>`:''}</div></div>`;}
window.onload=function(){nav('home');};
</script>

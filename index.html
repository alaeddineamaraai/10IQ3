<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>

  <title>10IQ — College Tennis Recruiting</title>

  <style>
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
button,a,.tab,.btn,.tr,.scard,.fc,.qq,.chk,.gc{transition:all .35s cubic-bezier(.16,1,.3,1);}
:root{
  --tg:#3b7af5;
  --tg-light:rgba(59,122,245,0.12);
  --tg-border:rgba(59,122,245,0.28);
  --bg:#e8ecf2;
  --glass-bg:rgba(255,255,255,0.55);
  --glass-bg-hover:rgba(255,255,255,0.72);
  --glass-border:rgba(255,255,255,0.80);
  --glass-border-hover:rgba(255,255,255,0.95);
  --glass-shadow:0 8px 32px rgba(100,120,160,0.13),inset 0 1px 0 rgba(255,255,255,0.9);
  --glass-shadow-hover:0 16px 48px rgba(80,100,140,0.18),inset 0 1px 0 rgba(255,255,255,1);
  --t1:rgba(18,24,40,0.92);
  --t2:rgba(18,24,40,0.58);
  --t3:rgba(18,24,40,0.36);
  --t4:rgba(18,24,40,0.18);
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  --mono:'SF Mono','ui-monospace',monospace;
  --glow-shadow:0 24px 60px -8px rgba(80,100,160,0.18);
}
body{
  background:var(--bg);
  background-image:
    radial-gradient(ellipse at 10% 10%,rgba(200,220,255,0.55) 0%,transparent 50%),
    radial-gradient(ellipse at 90% 80%,rgba(180,210,255,0.45) 0%,transparent 50%),
    radial-gradient(ellipse at 55% 40%,rgba(220,235,255,0.35) 0%,transparent 60%);
  font-family:var(--sans);
  color:var(--t1);
  -webkit-font-smoothing:antialiased;
  padding:0;
  min-height:100vh;
}
.wrap{
  background:rgba(232,236,242,0.3);
  backdrop-filter:blur(0px);
  min-height:100vh;
}
/* ── Glass card ── */
.gc{
  background:linear-gradient(160deg,rgba(255,255,255,0.62),rgba(255,255,255,0.42));
  backdrop-filter:blur(30px) saturate(180%);
  -webkit-backdrop-filter:blur(30px) saturate(180%);
  border:1px solid var(--glass-border);
  border-radius:24px;
  box-shadow:var(--glass-shadow);
  transition:all 0.4s cubic-bezier(0.22,1,0.36,1);
}
.gc-sm{border-radius:20px;}
.gc-xs{border-radius:12px;}
.gc:hover{
  background:linear-gradient(160deg,rgba(255,255,255,0.74),rgba(255,255,255,0.52));
  border-color:var(--glass-border-hover);
  box-shadow:var(--glass-shadow-hover);
  transform:translateY(-2px);
}
/* ── Topbar ── */
.topbar{
  background:rgba(255,255,255,0.55);
  backdrop-filter:blur(24px) saturate(160%);
  -webkit-backdrop-filter:blur(24px) saturate(160%);
  border-bottom:1px solid rgba(255,255,255,0.80);
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  height:76px;
  padding:0 48px;
  box-shadow:0 2px 20px rgba(100,120,160,0.07);
  position:sticky;top:0;z-index:100;
}
.logo{display:flex;align-items:center;gap:12px;font-size:22px;font-weight:800;letter-spacing:-0.5px;color:var(--t1);cursor:pointer;user-select:none;transition:transform 0.4s;}
.logo:hover{transform:scale(1.02);}
.plan-pill{
  font-size:12px;padding:5px 18px;border-radius:99px;
  background:rgba(255,255,255,0.60);
  border:1px solid rgba(200,210,230,0.7);
  color:var(--t2);letter-spacing:0.5px;font-weight:500;
}
.user-chip{
  display:flex;align-items:center;gap:10px;padding:8px 20px;border-radius:99px;cursor:pointer;margin-left:auto;
  background:rgba(255,255,255,0.60);
  border:1px solid rgba(200,215,240,0.7);
  font-size:14px;color:var(--t2);transition:all 0.4s;
}
.user-chip:hover{border-color:var(--tg-border);color:var(--tg);background:rgba(59,122,245,0.06);}
.av{width:30px;height:30px;border-radius:50%;background:rgba(59,122,245,0.14);border:1px solid rgba(59,122,245,0.30);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--tg);}
/* ── Mac mockup ── */
.mac-sec{padding:50px 24px 70px;display:flex;justify-content:center;perspective:1200px;}
.mac{transform:rotateX(20deg) scale(.8);opacity:0;transition:transform 1s cubic-bezier(.16,1,.3,1),opacity 1s ease;transform-origin:bottom center;}
.mac.in{transform:rotateX(0deg) scale(1);opacity:1;}
.mac-lid{width:680px;max-width:90vw;background:#0b0c10;border-radius:18px 18px 4px 4px;padding:10px;box-shadow:0 40px 80px rgba(30,40,70,.22);}
.mac-screen{background:#f4f7fd;border-radius:10px;overflow:hidden;aspect-ratio:16/10;padding:16px;}
.mac-base{width:720px;max-width:94vw;height:16px;margin:0 auto;background:linear-gradient(180deg,#1c1d22,#050507);border-radius:0 0 12px 12px;box-shadow:0 14px 24px rgba(20,30,60,.18);}

/* ── Bottom dock ── */
.dock{
  position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
  display:flex;gap:6px;align-items:flex-end;padding:10px 14px;
  background:linear-gradient(160deg,rgba(255,255,255,0.65),rgba(255,255,255,0.45));
  backdrop-filter:blur(26px) saturate(180%);
  -webkit-backdrop-filter:blur(26px) saturate(180%);
  border:1px solid rgba(255,255,255,0.80);
  border-radius:26px;
  box-shadow:0 12px 40px rgba(100,120,160,0.18),inset 0 1px 0 rgba(255,255,255,0.9);
  z-index:100;
}
.dock-i{
  width:50px;height:50px;border-radius:16px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:21px;color:var(--t2);
  background:transparent;border:1px solid transparent;
  transition:all 0.25s cubic-bezier(0.22,1,0.36,1);
}
.dock-i:hover{transform:translateY(-8px) scale(1.12);background:rgba(255,255,255,0.55);color:var(--tg);}
.dock-i.on{background:rgba(59,122,245,0.12);border-color:rgba(59,122,245,0.28);color:var(--tg);}

/* ── Layout ── */
.page{padding:48px 48px 110px;display:flex;flex-direction:column;gap:28px;max-width:1280px;margin:0 auto;}
.sg5{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;}
.sg4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.sg3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
.sg2{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
/* ── Stat cards ── */
.sc{padding:28px 32px;}
.sc-lbl{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px;font-weight:600;}
.sc-val{font-size:36px;font-weight:800;color:var(--t1);font-family:var(--mono);letter-spacing:-1.5px;}
/* ── Content panels ── */
.cp{padding:32px 36px;}
.cp-title{font-size:11px;color:var(--t2);text-transform:uppercase;letter-spacing:1.4px;margin-bottom:22px;font-weight:700;display:flex;justify-content:space-between;align-items:center;}
/* ── Progress bars ── */
.fb-bg{height:7px;background:rgba(100,120,180,0.10);border-radius:99px;overflow:hidden;margin-top:8px;}
.fb-fill{height:100%;background:linear-gradient(90deg,var(--tg),rgba(100,180,255,0.85));border-radius:99px;transition:width 1s cubic-bezier(0.16,1,0.3,1);}
.frow{margin-bottom:20px;}
/* ── Buttons ── */
.btn{
  padding:13px 26px;border-radius:16px;font-size:14px;font-weight:600;cursor:pointer;
  font-family:var(--sans);
  border:1px solid rgba(200,215,240,0.75);
  background:rgba(255,255,255,0.60);
  backdrop-filter:blur(10px);
  color:var(--t1);
  transition:all 0.4s cubic-bezier(0.16,1,0.3,1);
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 2px 8px rgba(100,120,160,0.08),inset 0 1px 0 rgba(255,255,255,0.9);
}
.btn:hover{border-color:var(--tg-border);color:var(--tg);background:rgba(59,122,245,0.07);transform:scale(1.02);box-shadow:0 4px 14px rgba(59,122,245,0.12);}
.btn-solid{
  background:linear-gradient(135deg,#3b7af5 0%,#5a9bff 100%);
  color:#fff;border-color:transparent;
  box-shadow:0 4px 18px rgba(59,122,245,0.30),inset 0 1px 0 rgba(255,255,255,0.20);
}
.btn-solid:hover{background:linear-gradient(135deg,#2f6ee0 0%,#4a8bf0 100%);color:#fff;transform:scale(1.02);box-shadow:0 6px 24px rgba(59,122,245,0.40);}
.btn-sm{padding:8px 18px;font-size:13px;border-radius:12px;}
.btn-lg{padding:18px 42px;font-size:16px;border-radius:20px;letter-spacing:-0.2px;}
/* ── Table ── */
.th,.tr{display:grid;padding:16px 24px;gap:12px;align-items:center;font-size:14px;}
.th{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;font-weight:700;background:rgba(220,230,248,0.18);border-bottom:1px solid rgba(200,215,240,0.55);}
.tr{border-bottom:1px solid rgba(200,215,240,0.30);cursor:pointer;transition:all 0.3s cubic-bezier(0.16,1,0.3,1);}
.tr:hover{background:rgba(59,122,245,0.04);transform:scale(1.003);border-color:rgba(59,122,245,0.15);}
/* ── Checkbox ── */
.chk{width:17px;height:17px;border-radius:6px;border:1.5px solid rgba(100,120,180,0.35);flex-shrink:0;transition:all 0.2s;cursor:pointer;}
.chk.on{background:var(--tg);border-color:var(--tg);box-shadow:0 0 8px rgba(59,122,245,0.35);}
/* ── Pills ── */
.pill{font-size:11px;padding:4px 13px;border-radius:99px;display:inline-flex;align-items:center;font-weight:600;letter-spacing:0.2px;}
.pill-tg{background:rgba(59,122,245,0.10);border:1px solid rgba(59,122,245,0.28);color:var(--tg);}
.pill-dim{background:rgba(59,130,246,0.09);border:1px solid rgba(59,130,246,0.25);color:#2a6bdc;}
.pill-ghost{background:rgba(100,120,180,0.06);border:1px solid rgba(150,170,210,0.30);color:var(--t3);}
/* ── Search ── */
.srch{
  width:100%;
  background:rgba(255,255,255,0.65);
  backdrop-filter:blur(12px);
  border:1px solid rgba(200,215,240,0.70);
  border-radius:18px;padding:14px 20px 14px 48px;font-size:15px;color:var(--t1);
  outline:none;font-family:var(--sans);
  transition:all 0.4s cubic-bezier(0.16,1,0.3,1);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.9);
}
.srch:focus{border-color:var(--tg-border);background:rgba(255,255,255,0.85);box-shadow:0 0 0 3px rgba(59,122,245,0.10),inset 0 1px 0 rgba(255,255,255,1);}
.srch-ico{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:18px;pointer-events:none;}
.srch-wrap{position:relative;}
/* ── AI chat ── */
.ai-user{
  background:rgba(59,122,245,0.10);
  border:1px solid rgba(59,122,245,0.22);
  border-radius:22px 22px 6px 22px;padding:16px 20px;font-size:15px;
  color:var(--t1);max-width:74%;margin-left:auto;line-height:1.7;
}
.ai-bot{
  background:rgba(255,255,255,0.60);
  backdrop-filter:blur(12px);
  border:1px solid rgba(200,215,240,0.60);
  border-radius:22px 22px 22px 6px;padding:16px 20px;font-size:15px;
  color:var(--t2);max-width:80%;line-height:1.7;
}
.ai-icon{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;background:rgba(59,122,245,0.10);border:1px solid rgba(59,122,245,0.22);color:var(--tg);}
/* ── Hero ── */
.hero{text-align:center;padding:110px 24px 72px;}
.hero-badge{
  display:inline-flex;align-items:center;gap:10px;
  background:rgba(59,122,245,0.08);
  border:1px solid rgba(59,122,245,0.22);
  border-radius:99px;padding:8px 24px;font-size:12px;color:var(--tg);
  letter-spacing:1.2px;text-transform:uppercase;margin-bottom:32px;font-weight:600;
}
.hero h1{font-size:76px;font-weight:900;letter-spacing:-3.5px;line-height:1.02;margin-bottom:28px;color:var(--t1);}
.hero h1 span{
  background:linear-gradient(90deg,#3b7af5,#7ab4ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.hero p{font-size:19px;color:var(--t2);max-width:560px;margin:0 auto 42px;line-height:1.70;}
.cta-row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
/* ── Stats bar ── */
.sbar{
  display:grid;grid-template-columns:repeat(4,1fr);
  border-top:1px solid rgba(200,215,240,0.55);
  border-bottom:1px solid rgba(200,215,240,0.55);
  background:rgba(255,255,255,0.30);
}
.sbar-i{padding:36px 0;text-align:center;border-right:1px solid rgba(200,215,240,0.40);}
.sbar-i:last-child{border-right:none;}
.sbar-n{font-size:40px;font-weight:800;font-family:var(--mono);letter-spacing:-1.5px;color:var(--t1);}
.sbar-l{font-size:14px;color:var(--t3);margin-top:6px;font-weight:500;}
/* ── Select ── */
.pg-select{
  background:rgba(255,255,255,0.60);backdrop-filter:blur(10px);
  border:1px solid rgba(200,215,240,0.70);
  color:var(--t1);padding:10px 16px;border-radius:12px;font-size:14px;outline:none;cursor:pointer;
}
/* ── Schools grid ── */
.schools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px;}
.scard{padding:26px;cursor:pointer;transition:all 0.4s;border-radius:26px;}
.scard:hover{background:var(--glass-bg-hover);border-color:var(--glass-border-hover);transform:translateY(-3px);}
.scard-name{font-size:17px;font-weight:700;color:var(--t1);margin-bottom:6px;}
.scard-coach{font-size:14px;color:var(--t2);margin-bottom:14px;}
.scard-stats{display:flex;gap:8px;flex-wrap:wrap;}
.ms{font-size:11px;color:var(--t2);background:rgba(255,255,255,0.55);border:1px solid rgba(200,215,240,0.60);border-radius:8px;padding:4px 11px;font-family:var(--mono);}
/* ── Filter chips ── */
.fchips{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:24px;}
.fc{
  font-size:13px;padding:8px 22px;border-radius:99px;cursor:pointer;
  border:1px solid rgba(200,215,240,0.65);
  background:rgba(255,255,255,0.50);
  color:var(--t2);transition:all 0.3s;font-family:var(--sans);font-weight:500;
}
.fc:hover,.fc.on{background:rgba(59,122,245,0.10);border-color:rgba(59,122,245,0.30);color:var(--tg);}
/* ── Pricing cards ── */
.pc{padding:40px 32px;transition:all 0.4s;position:relative;border-radius:28px;}
.pc.pop{border-color:rgba(59,122,245,0.40);background:rgba(59,122,245,0.04);}
.pop-b{
  position:absolute;top:-14px;left:50%;transform:translateX(-50%);
  background:rgba(59,122,245,0.12);border:1px solid rgba(59,122,245,0.35);
  border-radius:99px;padding:4px 18px;font-size:10px;font-weight:700;color:var(--tg);
  white-space:nowrap;letter-spacing:1px;
}
.pc-name{font-size:12px;text-transform:uppercase;letter-spacing:1.2px;color:var(--t2);margin-bottom:6px;font-weight:700;}
.pc-desc{font-size:13px;color:var(--t3);margin-bottom:18px;}
.pc-price{font-size:52px;font-weight:800;font-family:var(--mono);letter-spacing:-2px;margin-bottom:26px;color:var(--t1);}
.pc.pop .pc-price{color:var(--tg);}
.pc-f{font-size:14px;color:var(--t2);margin:9px 0;display:flex;gap:10px;align-items:center;}
.pc-ck{color:var(--t4);font-weight:bold;}
.pop .pc-ck{color:var(--tg);}
/* ── Misc ── */
.back-btn{font-size:14px;color:var(--t3);cursor:pointer;margin-bottom:12px;transition:color 0.2s;}
.back-btn:hover{color:var(--tg);}
.sdetail-hdr{display:flex;gap:28px;padding:36px;align-items:center;}
.sdetail-ini{width:72px;height:72px;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;}
.meta-tags{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.mt{font-size:13px;padding:5px 14px;border-radius:8px;background:rgba(255,255,255,0.50);border:1px solid rgba(200,215,240,0.55);color:var(--t2);}
.drow{display:flex;justify-content:space-between;padding:14px 0;border-bottom:1px solid rgba(200,215,240,0.28);font-size:14px;}
.drow:last-child{border-bottom:none;}
.qq{
  background:rgba(255,255,255,0.50);border:1px solid rgba(200,215,240,0.60);
  padding:10px 18px;border-radius:12px;font-size:13px;color:var(--t2);
  cursor:pointer;transition:all 0.2s;
}
.qq:hover{border-color:var(--tg-border);color:var(--tg);background:rgba(59,122,245,0.06);}
/* ── Input fields (inline styles override) ── */
input,textarea,select{color-scheme:light;}

async function finishOnboard(){const btn=document.getElementById('ob3-btn');btn.textContent='Loading...';btn.disabled=true;currentUser.style=document.getElementById('ob-style')?.value;currentUser.targetDiv=document.getElementById('ob-div')?.value;currentUser.region=document.getElementById('ob-region')?.value;currentUser.videoLink=document.getElementById('ob-video')?.value;currentUser.profileComplete=true;try{await sb(`users?email=eq.${encodeURIComponent(currentUser.email)}`,{method:'PATCH',body:JSON.stringify({utr:currentUser.utr,grad_year:currentUser.gradYear,gpa:currentUser.gpa,rank:currentUser.rank,wtn:currentUser.wtn,gender:currentUser.gender,school:currentUser.school,academy:currentUser.academy,location:currentUser.location,singles_record:currentUser.singlesRecord,doubles_record:currentUser.doublesRecord,style:currentUser.style,target_div:currentUser.targetDiv,region:currentUser.region,video_link:currentUser.videoLink,profile_complete:true})});}catch(e){console.error('profile save error:',e);}onboardStep=0;await loadCoaches();nav('dash');}
async function loadCoaches(){try{let all=[],from=0;while(true){const r=await fetch(`${SUPABASE_URL}/rest/v1/coaches_database?select=*&order=school_name.asc&limit=1000&offset=${from}`,{headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json',Accept:'application/json'}});if(!r.ok)break;const chunk=await r.json();all=[...all,...chunk];if(chunk.length<1000)break;from+=1000;}allCoaches=all;filteredCoaches=all;}catch(e){console.error('Load coaches error:',e);}}
function applyFilters(){const search=document.getElementById('coach-search')?.value?.toLowerCase()||'';const div=document.getElementById('div-filter')?.value||'All';filteredCoaches=allCoaches.filter(c=>{const matchSearch=!search||`${c.school_name}${c.coach_name}${c.division}`.toLowerCase().includes(search);const matchDiv=div==='All'||c.division===div;return matchSearch&&matchDiv;});currentPage=0;renderCoachTable();}
async function loadAndRenderDash(v){if(!allCoaches.length)await loadCoaches();renderDash(v);}
function renderDash(v){const sent=allCoaches.filter(c=>c.email_sent).length;const opened=allCoaches.filter(c=>c.email_opened).length;const replied=allCoaches.filter(c=>c.replied).length;const total=allCoaches.length;const openRate=sent>0?Math.round((opened/sent)*100):0;const replyRate=sent>0?Math.round((replied/sent)*100):0;const sentEmails=allCoaches.filter(c=>c.email_sent);v.innerHTML=topbar('dash')+`<div class="page"><div class="sg5">${[['Coaches',total.toLocaleString()],['Sent',sent],['Opened',opened],['Replied',replied],['Pending',(total-sent).toLocaleString()]].map(([l,val])=>`<div class="gc gc-sm sc"><div class="sc-lbl">${l}</div><div class="sc-val">${val}</div></div>`).join('')}</div><div class="gc cp"><div class="cp-title">Outreach activity — 7 days</div><div style="position:relative;height:110px;"><canvas id="d1"></canvas></div></div><div class="sg2"><div class="gc cp"><div class="cp-title">Outbound funnel</div>${[['In database',total,total],['Emails sent',sent,total],['Opened',opened,total],['Replied',replied,total]].map(([l,val,tot])=>`<div class="frow"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;"><span style="color:var(--t2)">${l}</span><span style="color:var(--t1);font-family:var(--mono);font-weight:600;">${val.toLocaleString()}</span></div><div class="fb-bg"><div class="fb-fill" style="width:${tot>0?Math.max((val/tot)*100,.3).toFixed(1):0}%"></div></div></div>`).join('')}</div><div class="gc cp"><div class="cp-title">Performance metrics</div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;">${[[openRate+'%','Open rate'],[replyRate+'%','Reply rate'],[sent>0?Math.round((sent/total)*100)+'%':'0%','Sent rate']].map(([val,l])=>`<div style="text-align:center;background:rgba(255,255,255,0.55);border:1px solid rgba(200,215,240,0.55);border-radius:12px;padding:12px 8px;"><div style="font-size:24px;font-weight:800;color:var(--tg);font-family:var(--mono);">${val}</div><div style= function renderSchools(v2){const v=v2||document.getElementById('view');const divs=['All',...Object.keys(DCH)];const schools=groupBySchool(allCoaches);const list=schoolFilter==='All'?schools:schools.filter(s=>s.division===schoolFilter);lastSchoolList=list;v.innerHTML=topbar('schools')+`<div class="page"><div class="srch-wrap"><span class="srch-ico">⌕</span><input class="srch" placeholder="Search ${schools.length} schools..." oninput="liveSchoolFilter(this.value)"/></div><div class="fchips">${divs.map(d=>`<button class="fc ${schoolFilter===d?'on':''}" onclick="setSF('${d}')">${d}</button>`).join('')}</div><div style="font-size:12px;color:var(--t3);font-family:var(--mono);margin-bottom:4px;">${list.length} schools</div><div class="schools-grid" id="sg">${list.map((s,idx)=>sCard(s,idx)).join('')}</div></div>`;}

async function generateEmail(email){const c=allCoaches.find(x=>x.email===email);if(!c)return;const btn=document.querySelector(`[onclick="generateEmail('${email}')"]`);if(btn){btn.textContent='Generating...';btn.disabled=true;}try{const system=`You are an expert college tennis recruiting email writer. Write concise, personalized recruiting emails (150-200 words) from a high school tennis player to a college coach. Output ONLY valid JSON: {"subject":"...","body":"..."}. No markdown, no explanation.`;const userMsg=`Write a recruiting email.\nATHLETE: Name: ${currentUser.name}, UTR: ${currentUser.utr||'N/A'}, WTN: ${currentUser.wtn||'N/A'}, GPA: ${currentUser.gpa||'N/A'}, Grad year: ${currentUser.gradYear||'N/A'}, School: ${currentUser.school||'N/A'}, Location: ${currentUser.location||'N/A'}, Singles record: ${currentUser.singlesRecord||'N/A'}, Doubles: ${currentUser.doublesRecord||'N/A'}, Style: ${currentUser.style||'N/A'}, Video: ${currentUser.videoLink||'N/A'}\nCOACH: ${c.coach_name}, ${c.school_name}, ${c.division}, Team UTR: ${c.team_utr||'N/A'}, Team WTN: ${c.team_wtn||'N/A'}`;const txt=await callClaude([{role:'user',content:userMsg}],system);const parsed=JSON.parse(txt.replace(/```json|```/g,'').trim());generatedEmails[email]=parsed;renderCoaches();}catch(e){alert('Failed to generate email: '+e.message);if(btn){btn.textContent='Draft AI Email';btn.disabled=false;}}}

async function sendAI(preset){const input=document.getElementById('ai-input');const msg=preset||input?.value?.trim();if(!msg)return;if(input)input.value='';aiHistory.push({role:'user',content:msg});renderAI();try{const system=`You are an elite college tennis recruiting advisor with access to ${allCoaches.length} coaches. The athlete's profile: ${JSON.stringify(currentUser)}. Be specific, helpful, and concise.`;const reply=await callClaude(aiHistory,system);aiHistory.push({role:'assistant',content:reply});}catch(e){aiHistory.push({role:'assistant',content:'Sorry, I encountered an error. Please try again.'});}renderAI();}
function renderProfile(v){v.innerHTML=topbar('dash')+`<div class="page"><div class="gc cp"><div class="cp-title">Profile</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;">${[['Name',currentUser.name||''],['Email',currentUser.email||''],['UTR',currentUser.utr||''],['Grad Year',currentUser.gradYear||''],['GPA',currentUser.gpa||''],['Location',currentUser.location||''],['School',currentUser.school||''],['Singles',currentUser.singlesRecord||''],['Doubles',currentUser.doublesRecord||''],['WTN',currentUser.wtn||'']].map(([l,val])=>`<div><div style="font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);margin-bottom:5px;font-weight:600;">${l}</div><div style="font-size:13px;color:var(--t1);background:rgba(255,255,255,0.65);border:1px solid rgba(200,215,240,0.60);border-radius:10px;padding:10px 13px;">${val||'—'}</div></div>`).join('')}</div><div style="display:flex;gap:10px;"><button class="btn" onclick="nav('dash')">← Dashboard</button><button class="btn btn-solid" style="color:rgba(239,68,68,0.9);background:rgba(239,68,68,0.08);border-color:rgba(239,68,68,0.2);" onclick="currentUser=null;allCoaches=[];clearSession();nav('home')">Sign out</button></div></div><div class="gc cp"><div class="cp-title">Subscription</div><div style="font-size:18px;font-weight:800;color:var(--t1);margin-bottom:4px;">${currentUser.plan==='elite'?'Elite Plan':currentUser.plan==='pro'?'Pro Plan':'Free Plan'}</div><div style="font-size:13px;color:var(--t2);margin-bottom:16px;">${currentUser.emailsUsed||0} of ${currentUser.plan==='free'?'5':'unlimited'} emails used</div>${currentUser.plan==='free'?`<button class="btn btn-solid" onclick="nav('paywall')">Upgrade plan →</button>`:''}</div></div>`;}
async function handleEmailConfirmation(){const h=location.hash;if(!h.includes('access_token='))return false;const params=new URLSearchParams(h.slice(1));const access_token=params.get('access_token'),refresh_token=params.get('refresh_token');if(!access_token)return false;history.replaceState(null,'',location.pathname+location.search);try{const r=await fetch(`${SUPABASE_URL}/auth/v1/user`,{headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${access_token}`}});const d=await r.json();if(!r.ok||!d.email)return false;const email=d.email;let profile={};try{const rows=await sb(`users?email=eq.${encodeURIComponent(email)}&select=*`);if(rows[0])profile=rows[0];}catch(e){}if(!profile.email){try{await sb('users',{method:'POST',body:JSON.stringify({email,name:email.split('@')[0],plan:'free',emails_used:0})});}catch(e){console.error('users insert error:',e);}}currentUser={email,name:profile.name||email.split('@')[0],plan:profile.plan||'free',emailsUsed:profile.emails_used||0,token:access_token,refreshToken:refresh_token,utr:profile.utr,gradYear:profile.grad_year,gpa:profile.gpa,rank:profile.rank,wtn:profile.wtn,gender:profile.gender,school:profile.school,academy:profile.academy,location:profile.location,singlesRecord:profile.singles_record,doublesRecord:profile.doubles_record,style:profile.style,targetDiv:profile.target_div,region:profile.region,videoLink:profile.video_link,profileComplete:profile.profile_complete};saveSession();await loadCoaches();if(!currentUser.profileComplete){onboardStep=1;renderSignIn(document.getElementById('view'));}else nav('dash');return true;}catch(e){console.error('email confirm error:',e);return false;}}
window.onload=async function(){const confirmed=await handleEmailConfirmation();if(confirmed)return;const restored=await restoreSession();if(!restored)nav('home');};

// ── Subtle mouse-tracking background ──
(function(){
  const o1=document.createElement('div');
  const o2=document.createElement('div');
  const s={position:'fixed',borderRadius:'50%',pointerEvents:'none',zIndex:'-1',filter:'blur(80px)',transition:'transform 0.08s linear',willChange:'transform'};
  Object.assign(o1.style,s,{width:'520px',height:'520px',background:'radial-gradient(circle,rgba(170,205,255,0.62) 0%,transparent 70%)',top:'-260px',left:'-260px'});
  Object.assign(o2.style,s,{width:'380px',height:'380px',background:'radial-gradient(circle,rgba(200,220,255,0.48) 0%,transparent 70%)',top:'-190px',left:'-190px',transitionDuration:'0.14s'});
  document.body.appendChild(o1);
  document.body.appendChild(o2);
  let tx=window.innerWidth/2,ty=window.innerHeight/2;
  let x1=tx,y1=ty,x2=tx,y2=ty;
  document.addEventListener('mousemove',e=>{tx=e.clientX;ty=e.clientY;});

  // ambient orbs drifting independently across the whole viewport
  const ambient=[
    {el:document.createElement('div'),w:560,h:560,c:'rgba(160,200,255,0.40)',sx:0.21,sy:0.17,px:0.15,py:0.5},
    {el:document.createElement('div'),w:460,h:460,c:'rgba(190,215,255,0.34)',sx:0.13,sy:0.24,px:0.8,py:0.25},
    {el:document.createElement('div'),w:400,h:400,c:'rgba(175,205,255,0.30)',sx:0.18,sy:0.11,px:0.5,py:0.85}
  ];
  ambient.forEach(o=>{
    Object.assign(o.el.style,{position:'fixed',width:o.w+'px',height:o.h+'px',borderRadius:'50%',pointerEvents:'none',zIndex:'-1',filter:'blur(90px)',background:`radial-gradient(circle,${o.c} 0%,transparent 70%)`,top:'0',left:'0',willChange:'transform'});
    document.body.appendChild(o.el);
  });
  function ambientTick(t){
    const W=window.innerWidth,H=window.innerHeight;
    ambient.forEach(o=>{
      const x=W*o.px+Math.sin(t*o.sx+o.px*10)*W*0.28-o.w/2;
      const y=H*o.py+Math.cos(t*o.sy+o.py*10)*H*0.28-o.h/2;
      o.el.style.transform=`translate(${x}px,${y}px)`;
    });
  }

  function tick(ts){
    x1+=(tx-x1)*0.06; y1+=(ty-y1)*0.06;
    x2+=(tx-x2)*0.10; y2+=(ty-y2)*0.10;
    o1.style.transform=`translate(${x1}px,${y1}px)`;
    o2.style.transform=`translate(${x2}px,${y2}px)`;
    ambientTick((ts||0)/1000);
    requestAnimationFrame(tick);
  }
  tick();
})();
</script>
